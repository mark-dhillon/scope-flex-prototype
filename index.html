<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scope + Flex — Call Team Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2563EB; --blue-d:#1D4ED8; --blue-soft:#EEF3FE; --blue-softer:#F5F8FF;
    --chip-bg:#EAF1FE; --chip-tx:#1D4ED8;
    --purple-bg:#F0EAFE; --purple-tx:#6321b0;
    --red:#E1473D; --red-soft:#FDEEEC; --red-tx:#B5362C;
    --green:#16A34A; --green-bg:#E7F6EC; --green-tx:#157F3C;
    --amber:#D97706; --amber-bg:#FBF0DD; --amber-tx:#92590B;
    --ink:#15181E; --ink2:#5B616E; --ink3:#9298A4;
    --line:rgba(20,23,28,.09); --line2:rgba(20,23,28,.14);
    --surface:#FAFBFC; --white:#fff; --page:#F4F5F7;
    --r-lg:16px; --r-md:11px; --r-sm:8px;
    --ease:cubic-bezier(.32,.72,.35,1);
    --shadow:0 1px 3px rgba(20,23,28,.06);
    --shadow-pop:0 12px 40px rgba(20,23,28,.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);background:var(--page);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-.006em;}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;}
  svg{display:block;}
  ::selection{background:#cfe0fd;}
  .wrap{max-width:1100px;margin:0 auto;padding:20px 18px 56px;}

  .harness{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;padding:0 2px;}
  .harness .ey{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);}
  .harness .ttl{font-size:14px;font-weight:600;}
  .harness .spacer{flex:1;}
  .seg{display:inline-flex;background:#EAEBEE;border-radius:9px;padding:3px;gap:2px;}
  .seg button{font-size:13px;font-weight:500;padding:6px 14px;border-radius:7px;color:var(--ink2);transition:.16s var(--ease);}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(20,23,28,.08);}
  .tog{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:450;color:var(--ink2);}
  .sw{width:38px;height:22px;border-radius:20px;background:#CDD0D6;position:relative;transition:.18s var(--ease);}
  .sw.on{background:var(--blue);}
  .sw i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s var(--ease);box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .sw.on i{left:18px;}
  .reset{font-size:13px;font-weight:450;color:var(--ink2);padding:6px 12px;border-radius:8px;transition:.15s var(--ease);}
  .reset:hover{background:#EAEBEE;color:var(--ink);}

  .app{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:calc(100dvh - 140px);display:flex;flex-direction:column;}
  .stage{animation:rise .26s var(--ease);flex:1;display:flex;flex-direction:column;}
  .stage>.main,.stage>.body,.stage>.sup{flex:1;}
  @keyframes rise{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}

  .strip{display:flex;align-items:center;gap:14px;padding:11px 18px;background:var(--blue-softer);border-bottom:1px solid var(--line);flex-wrap:wrap;position:relative;}
  .strip .who{display:flex;align-items:center;gap:9px;font-size:13.5px;color:#1B3F8F;}
  .strip .who b{font-weight:600;color:#14306e;}
  .strip .tm{font-size:14px;font-weight:600;color:#14306e;font-variant-numeric:tabular-nums;letter-spacing:0;}
  .cbtn{width:36px;height:36px;border-radius:9px;background:#fff;border:1px solid #d4e0fa;color:#234ea8;display:flex;align-items:center;justify-content:center;transition:.14s var(--ease);}
  .cbtn:hover{border-color:#9dbcf4;}.cbtn:active{transform:scale(.94);}
  .cbtn.on{background:#234ea8;color:#fff;border-color:#234ea8;}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:500;padding:5px 11px;border-radius:20px;}
  .pill.avail{background:var(--green-bg);color:var(--green-tx);}
  .pill.oncall{background:#E1E9FC;color:#234ea8;}
  .pdot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .pill.oncall .pdot,.pill.avail .pdot{animation:blip 1.6s var(--ease) infinite;}
  @keyframes blip{0%,100%{opacity:1;}50%{opacity:.4;}}

  .body{display:grid;grid-template-columns:252px 1fr;min-height:580px;}
  .rail{border-right:1px solid var(--line);padding:18px 14px 14px;display:flex;flex-direction:column;background:#FCFCFD;}
  .rail .lab{font-size:12.5px;color:var(--ink2);font-weight:500;margin:0 8px 12px;}
  .qi{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 11px;border-radius:9px;font-size:13.5px;color:var(--ink2);transition:.13s var(--ease);}
  .qi:hover{background:#F1F2F4;}
  .qi.on{background:var(--blue-soft);color:var(--ink);font-weight:500;}
  .qi .bdg{font-size:11.5px;font-weight:500;padding:2px 9px;border-radius:11px;background:#EDEef1;color:var(--ink3);font-variant-numeric:tabular-nums;}
  .qi .bdg.fill{background:var(--blue);color:#fff;}
  .qi .bdg.soft{background:#fff;border:1px solid var(--line2);color:var(--ink3);font-weight:450;}
  .rail .tr{margin-top:16px;padding-top:15px;border-top:1px solid var(--line);flex:1;min-height:90px;}
  .tr .who{font-size:11px;font-weight:600;color:var(--ink3);margin:0;}
  .tr p.q{font-size:12.5px;line-height:1.5;margin:2px 0 11px;color:var(--ink2);}
  .tr .ph{font-size:12.5px;color:var(--ink3);font-style:italic;}
  .foot{display:flex;align-items:center;gap:9px;padding:12px 8px 2px;margin-top:8px;border-top:1px solid var(--line);}
  .orb{width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 32% 30%,#7FB0FF,#2563EB 78%);box-shadow:0 1px 3px rgba(37,99,235,.4);}
  .foot .nm{font-size:13.5px;font-weight:600;flex:1;}
  .foot .icb{color:var(--ink3);padding:4px;border-radius:6px;transition:.13s;}
  .foot .icb:hover{background:#EDEef1;color:var(--ink2);}

  .main{padding:22px 26px;}
  .phead{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
  .pname{display:flex;align-items:center;gap:13px;}
  .pname .n{font-size:16px;font-weight:600;}
  .pname .div{width:1px;height:18px;background:var(--line2);}
  .pname .m{font-size:13.5px;color:var(--ink2);}
  .acts{display:flex;align-items:center;gap:9px;}
  .btn{font-size:13.5px;font-weight:500;padding:9px 15px;border-radius:9px;border:1px solid var(--line2);background:#fff;color:var(--ink);display:inline-flex;align-items:center;gap:8px;transition:.14s var(--ease);}
  .btn:hover{border-color:var(--ink3);background:#FCFCFD;}.btn:active{transform:scale(.98);}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff;}
  .btn.pri:hover{background:var(--blue-d);border-color:var(--blue-d);}
  .btn.rec.on{background:var(--red);border-color:var(--red);color:#fff;}
  .recOn{border-color:#f0c4c0;color:var(--red);background:var(--red-soft);}
  .recOn:hover{border-color:var(--red);background:#FCE3E0;}
  .recdot{width:9px;height:9px;border-radius:50%;background:var(--red);display:inline-block;animation:blip 1.3s var(--ease) infinite;}
  .rectime{font-variant-numeric:tabular-nums;}
  .body{min-height:0;}
  .body>.rail{overflow-y:auto;min-height:0;}
  .visitMain{display:flex;flex-direction:column;overflow:hidden;min-height:0;}
  .visitMain .phead{flex-shrink:0;}
  .qscroll{flex:1;min-height:0;overflow-y:auto;}

  .sectit{display:flex;align-items:center;gap:11px;margin:0 0 14px;}
  .sectit .t{font-size:17px;font-weight:600;letter-spacing:-.01em;}
  .sectit .bdg{font-size:11.5px;font-weight:500;padding:2px 9px;border-radius:11px;background:var(--blue);color:#fff;}
  .sectit .bdg.soft{background:#EDEef1;color:var(--ink3);}

  .qcard{display:flex;align-items:flex-start;gap:13px;padding:15px 17px;border:1px solid var(--line);border-radius:var(--r-md);margin-bottom:10px;cursor:pointer;transition:.15s var(--ease);background:#fff;}
  .qcard:hover{border-color:var(--line2);box-shadow:0 1px 3px rgba(20,23,28,.05);}
  .qcard.done{background:var(--blue-softer);border-color:#dbe6fc;}
  .ck{width:21px;height:21px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;transition:.15s var(--ease);}
  .qcard:hover .ck{border-color:var(--blue);}
  .qcard.done .ck{background:var(--blue);border-color:var(--blue);animation:pop .22s var(--ease);}
  @keyframes pop{0%{transform:scale(.6);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  .qcard .qt{font-size:14.5px;line-height:1.55;}
  .qcard.done .qt{color:var(--ink2);}

  /* queue */
  .qhead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .qhead h2{font-size:19px;font-weight:600;letter-spacing:-.015em;margin:0;}
  .qhead .stats{font-size:13.5px;color:var(--ink2);margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .qhead .stats b{color:var(--ink);font-weight:600;}
  .qhead .stats .sep{color:var(--line2);}
  .queue{border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .qtabs{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--line);background:var(--surface);}
  .qtab{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;padding:6px 12px;border-radius:7px;color:var(--ink2);transition:.14s var(--ease);}
  .qtab.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(20,23,28,.08);}
  .qtab .c{font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px;background:#E3E5E9;color:var(--ink2);}
  .qtab.on .c{background:var(--blue);color:#fff;}
  .qr{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid rgba(20,23,28,.05);transition:.13s var(--ease);}
  .qr:last-child{border-bottom:0;}
  .qr:hover{background:var(--surface);}
  .qr.next{background:var(--blue-softer);}
  .qr .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
  .qr .mid{flex:1;min-width:0;}
  .qr .r1{display:flex;align-items:center;gap:9px;flex-wrap:wrap;line-height:1.25;}
  .qr .nm{font-size:14px;font-weight:600;letter-spacing:-.01em;}
  .qr .r2{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin-top:5px;}
  .homeMain{display:flex;flex-direction:column;overflow:hidden;}
  .homeMain .greet{flex-shrink:0;}
  .homeMain>.fz{flex:1;min-height:0;display:flex;flex-direction:column;}
  .homeMain .queue{flex:1;min-height:0;display:flex;flex-direction:column;}
  .homeMain .qtabs{flex-shrink:0;}
  .qlist{flex:1;min-height:0;overflow-y:auto;}
  .ntag{display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:2px 8px;border-radius:4px;line-height:1.45;white-space:nowrap;}
  .ntag.pomona{background:#E6EFFC;color:#1D4ED8;}
  .ntag.rhode{background:#E3F3E8;color:#16713A;}
  .ntag.street{background:#EFE9FC;color:#6B2DB8;}
  .ntag.amber{background:#FAEEDB;color:#8A5407;}
  .ntag.slate{background:#E9EDF3;color:#42536B;}
  .ntag.gray{background:#EDEEF1;color:#5B616E;}
  .ntag.teal{background:#DDF0EC;color:#0F6E56;}
  .qctx{font-size:12.5px;color:var(--ink3);margin-top:6px;}
  .lbl{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:450;color:var(--ink2);}
  .ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .ldot.es{background:#DD8A12;}
  .ldot.en{background:#5685D6;}
  .qr .meta{font-size:12.5px;color:var(--ink3);}
  .doc{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--ink);}
  .docav{width:20px;height:20px;border-radius:50%;background:#DDF0EC;color:#0F6E56;display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;flex-shrink:0;}
  .qr .right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  .qr .big{font-size:14.5px;font-weight:600;font-variant-numeric:tabular-nums;}
  .qr .big.long{color:var(--amber);}
  .qr .sm{font-size:11.5px;color:var(--ink3);}
  .skill{font-size:11px;font-weight:500;padding:2px 9px;border-radius:11px;}
  .skill.es{background:var(--amber-bg);color:var(--amber-tx);}
  .skill.en{background:var(--chip-bg);color:var(--chip-tx);}
  .dir{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:11px;}
  .dir.in{background:#E1E9FC;color:#234ea8;}
  .dir.out{background:var(--purple-bg);color:var(--purple-tx);}
  .tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:5px;letter-spacing:.02em;}
  .tag.urgent{background:var(--red-soft);color:var(--red-tx);}
  .tag.attempt{background:#EDEef1;color:var(--ink2);}
  .tag.next{background:var(--blue);color:#fff;}

  .greet{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
  .greet h1{font-size:23px;font-weight:600;letter-spacing:-.02em;margin:0;}
  .greet .sched{font-size:14px;color:var(--ink2);margin-top:8px;line-height:1.55;max-width:580px;}
  .greet .sched b{color:var(--ink);font-weight:600;}
  .status{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;padding:8px 13px;border-radius:10px;border:1px solid var(--line2);background:#fff;transition:.14s var(--ease);}
  .status:hover{border-color:var(--ink3);}
  .status .sd{width:8px;height:8px;border-radius:50%;}
  .status.avail .sd{background:var(--green);}
  .status.brk .sd{background:var(--amber);}
  .status svg{color:var(--ink3);}
  .mkt{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:11px;background:#EEEFF2;color:var(--ink2);}
  .mkt svg{opacity:.65;}
  .qr .sub{font-size:12px;color:var(--ink3);}
  .qr .time{font-size:12.5px;color:var(--ink2);font-variant-numeric:tabular-nums;}
  .metaLine{display:flex;align-items:center;flex-wrap:wrap;gap:0;font-size:12.5px;color:var(--ink3);}
  .metaLine .sep{margin:0 8px;color:#C1C6CF;}
  .qr .time.long{color:var(--amber);font-weight:600;}
  .callbtn{font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;background:var(--blue);color:#fff;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:98px;height:30px;transition:.14s var(--ease);}
  .callbtn:hover{background:var(--blue-d);}.callbtn:active{transform:scale(.97);}
  .callbtn.ans{background:var(--green);}
  .callbtn.ans:hover{background:#138538;}

  .scrim{position:fixed;inset:0;background:rgba(20,23,28,.42);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;padding:6vh 26px 26px;z-index:40;animation:fade .2s var(--ease);overflow-y:auto;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .modal{background:#fff;border-radius:18px;width:536px;max-width:100%;padding:28px 30px;max-height:88vh;overflow:auto;box-shadow:var(--shadow-pop);animation:popin .26s var(--ease);}
  @keyframes popin{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
  .modal h2{font-size:22px;font-weight:600;margin:0 0 5px;letter-spacing:-.015em;}
  .modal .lead{font-size:14px;color:var(--ink2);margin:0 0 22px;}
  .prev{border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;background:var(--surface);}
  .prev .l{font-size:14px;font-weight:600;}.prev .s{font-size:12.5px;color:var(--ink2);margin-top:4px;}
  .chk{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .vt{display:grid;grid-template-columns:1fr 1fr;gap:5px;background:#EEEFF2;border-radius:11px;padding:4px;margin-bottom:20px;}
  .vt div{padding:11px;text-align:center;font-size:14px;font-weight:500;color:var(--ink2);border-radius:8px;transition:.14s var(--ease);}
  .vt div.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(20,23,28,.1);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
  .fld label{font-size:13px;font-weight:500;display:block;margin-bottom:7px;}
  .fld .v{font-size:14px;border:1px solid var(--line2);border-radius:9px;padding:11px 13px;background:#fff;display:flex;align-items:center;justify-content:space-between;min-height:42px;}
  .fld .v.ro{background:var(--surface);}
  .fld .v svg{color:var(--ink3);}
  .mact{display:flex;justify-content:space-between;align-items:center;margin-top:26px;}

  .reason{border:1px solid var(--line);border-radius:13px;padding:15px 16px;margin-bottom:11px;display:flex;gap:13px;align-items:flex-start;cursor:pointer;transition:.14s var(--ease);}
  .reason:hover{border-color:var(--line2);}
  .reason.sel{border-color:var(--blue);background:var(--blue-softer);}
  .rad{width:20px;height:20px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.14s var(--ease);}
  .reason.sel .rad{border-color:var(--blue);}
  .reason.sel .rad::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--blue);animation:pop .2s var(--ease);}
  .reason .rt{font-size:14.5px;font-weight:600;}
  .reason .rs{font-size:12.5px;color:var(--ink2);margin-top:3px;}

  .incoming{width:430px;max-width:100%;background:#fff;border-radius:20px;padding:30px 28px 24px;text-align:center;box-shadow:var(--shadow-pop);animation:popin .28s var(--ease);position:relative;}
  .incoming .ring{width:72px;height:72px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;animation:pulse 1.5s var(--ease) infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,99,235,.3);}70%{box-shadow:0 0 0 18px rgba(37,99,235,0);}100%{box-shadow:0 0 0 0 rgba(37,99,235,0);}}
  .incoming .lab{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:9px;}
  .incoming .n{font-size:21px;font-weight:600;letter-spacing:-.01em;}
  .incoming .d{font-size:13.5px;color:var(--ink2);margin:6px 0 22px;}
  .incoming .row{display:flex;gap:12px;}
  .incoming .row .btn{flex:1;justify-content:center;padding:13px;font-size:14.5px;}
  .btn.decline{border-color:var(--line2);color:var(--ink2);}
  .btn.decline:hover{border-color:var(--red);color:var(--red);background:var(--red-soft);}
  .btn.accept{background:var(--green);border-color:var(--green);color:#fff;}
  .btn.accept:hover{background:#138538;border-color:#138538;}

  .stab{display:inline-flex;background:#EEEFF2;border-radius:9px;padding:3px;gap:2px;}
  .stab button{font-size:13px;font-weight:500;padding:7px 16px;border-radius:7px;color:var(--ink2);transition:.15s var(--ease);}
  .stab button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(20,23,28,.08);}
  .stat{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);}
  .stat .l{font-size:13px;color:var(--ink2);}.stat .v{font-size:14px;font-weight:600;}
  .brief{border:1px solid var(--line);border-radius:14px;padding:26px 28px;max-width:660px;}
  .brief h4{font-size:16px;font-weight:600;margin:22px 0 8px;letter-spacing:-.01em;}
  .brief h4:first-child{margin-top:0;}

let S,callInt=null,recInt=null;
const fresh=()=>({view:'agent',screen:'available',modal:null,fx:false,qtab:'outbound',status:'Ready',active:null,muted:false,hold:false,recording:false,recPaused:false,callSec:0,recSec:0,reason:0,answered:[],sumTab:'brief'});
S=fresh();
const app=document.getElementById('app');
const fmt=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
function toast(t){const e=document.getElementById('toast');e.innerHTML=ic('zap',16,'#7FB0FF')+'<span>'+t+'</span>';e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2200);}
function stop(){if(callInt){clearInterval(callInt);callInt=null;}if(recInt){clearInterval(recInt);recInt=null;}}
function runCall(){stop();S.callSec=0;callInt=setInterval(()=>{if(!S.hold){S.callSec++;const t=document.getElementById('callTimer');if(t)t.textContent=fmt(S.callSec);}},1000);}
const P=()=>S.active||QUEUE[0];
const lang=s=>s==='es'?'Spanish':'English';
const MKT={'Pomona':'pomona','Rhode Island':'rhode','Street Med':'street'};
function mkt(m){return `<span class="ntag ${MKT[m]||'gray'}">${m}</span>`;}
function langtag(s){return `<span class="lbl"><span class="ldot ${s}"></span>${lang(s)}</span>`;}
function langChip(s){return `<span class="ntag ${s==='es'?'amber':'slate'}">${lang(s)}</span>`;}
function spanishBadge(s){return s==='es'?'<span class="ntag amber">Spanish</span>':'';}
function waitSeconds(t){const [m='0',s='0']=String(t).split(':');return (parseInt(m,10)||0)*60+(parseInt(s,10)||0);}
function isUrgentWait(t){return waitSeconds(t)>120;}
function vtag(t){return `<span class="ntag gray">${t}</span>`;}
function drtag(p){return `<span class="ntag teal">${p}</span>`;}
function doctag(p){return `<span class="lbl"><span class="ldot doc"></span>${p}</span>`;}

function strip(){
 const p=P();
 return `<div class="strip fz"><span class="ftag"><span class="tdot"></span>Flex</span>
  <span class="who">${ic('phone',16,'#234ea8')} On call &nbsp;·&nbsp; <b>${p.nm}</b> &nbsp;·&nbsp; ${p.phone}</span>
  <span class="tm" id="callTimer">0:00</span><span style="flex:1"></span>
  <button class="cbtn ${S.muted?'on':''}" id="mute" aria-label="Mute">${ic(S.muted?'micOff':'mic',17)}</button>
  <button class="cbtn ${S.hold?'on':''}" id="hold" aria-label="Hold">${ic('pause',17)}</button>
  <button class="cbtn" id="xfer" aria-label="Transfer">${ic('transfer',17)}</button>
  <span class="pill oncall"><span class="pdot"></span>On call</span>
  <span style="font-size:12.5px;color:#234ea8;font-weight:500">Amy Luna</span></div>`;
}
function startRecTimer(){if(recInt)clearInterval(recInt);recInt=setInterval(()=>{if(!S.recPaused){S.recSec++;const t=document.getElementById('rectime');if(t)t.textContent=fmt(S.recSec);}},1000);}
function rail(){
 let items='';
 SECTIONS.forEach((s,idx)=>{
  const c=ansCount(s.k),active=idx===0;
  const bdg=s.badge?`<span class="bdg soft">${s.badge}</span>`:`<span class="bdg ${active&&c>0?'fill':''}">${c}/${s.q.length}</span>`;
  items+=`<div class="qi ${active?'on':''}"><span>${s.n}</span>${bdg}</div>`;
 });
 let tr='';
 S.answered.forEach(id=>{const[k,i]=id.split(':');const sec=SECTIONS.find(s=>s.k===k);if(sec){const qq=sec.q[+i];tr+=`<p class="who">MA</p><p class="q">${qq[0]}</p><p class="who">PATIENT</p><p class="q">${qq[1]}</p>`;}});
 if(!tr)tr='<p class="ph">Recording will transcribe the call here…</p>';
 return `<div class="rail"><div class="lab">Questions</div>${items}
  <div class="tr"><div class="lab" style="margin-left:0">Transcript</div>${tr}</div>
  <div class="foot"><span class="orb"></span><span class="nm">Scope AI</span>
   <button class="icb" aria-label="Help">${ic('help',17)}</button><button class="icb" aria-label="Account">${ic('user',17)}</button><button class="icb" aria-label="Collapse">${ic('panel',17)}</button></div></div>`;
}
function questions(){
 return SECTIONS.map(s=>{
  const c=ansCount(s.k);
  const bdg=s.badge?`<span class="bdg soft">${s.badge}</span>`:`<span class="bdg ${c>0?'':'soft'}">${c}/${s.q.length}</span>`;
  const cards=s.q.map((qq,i)=>{const d=isAns(s.k,i);return `<div class="qcard ${d?'done':''}" data-k="${s.k}" data-i="${i}"><span class="ck">${d?ic('check',14):''}</span><span class="qt">${qq[0]}</span></div>`;}).join('');
  return `<div class="sectit"><span class="t">${s.n}</span>${bdg}</div>${cards}`;
 }).join('');
}

function queueRows(){
 function meta(p){
  const parts=[p.market,p.prov,p.type];
  return `<div class="metaLine">${parts.map((part,idx)=>`${idx?'<span class="sep">·</span>':''}<span>${part}</span>`).join('')}</div>`;
 }
 if(S.qtab==='inbound'){
  return CALLBACKS.map((c,i)=>{const urgent=isUrgentWait(c.wait);return `<div class="qr">${avatar(c.nm,38)}
   <div class="mid"><div class="r1"><span class="nm">${c.nm}</span>${urgent?'<span class="tag urgent">Urgent</span>':''}${spanishBadge(c.skill)}</div>
    <div class="r2">${meta(c)}</div></div>
   <div class="right"><span class="time ${urgent?'long':''}">${c.wait} waiting</span>
    <button class="callbtn ans" data-call="${i}">${ic('phoneIn',14)} Answer</button></div></div>`;}).join('');
 }
 return QUEUE.map((p,i)=>`<div class="qr">${avatar(p.nm,38)}
  <div class="mid"><div class="r1"><span class="nm">${p.nm}</span>${spanishBadge(p.skill)}</div>
   <div class="r2">${meta(p)}</div></div>
  <div class="right"><span class="time">${p.sched}</span>
   <button class="callbtn" data-call="${i}">${ic('phoneOut',14)} Call</button></div></div>`).join('');
}

   <h4>Allergies</h4><p>No known drug allergies.</p>
   <h4>Family history</h4><p>Father — <span class="term">myocardial infarction</span>. Mother — <span class="term">type 2 diabetes</span>. No known family history of cancer.</p>

 }
}

   </div>
  </div></div></div>`;
 document.getElementById('sigmaBtn').onclick=()=>{toast('Opening historical KPIs in Sigma');window.open('https://app.sigmacomputing.com/','_blank','noopener');};
 document.getElementById('teamFilter').onclick=()=>toast('Filter by pod or clinic');
 document.querySelectorAll('.listenBtn:not([disabled])').forEach(m=>m.onclick=()=>toast(m.dataset.a));
 document.querySelectorAll('[data-start]').forEach(b=>b.onclick=()=>{S.view='agent';S.qtab='inbound';S.active=CALLBACKS[+b.dataset.start];S.screen='startVisit';document.querySelectorAll('#roleSeg button').forEach(x=>x.classList.toggle('on',x.dataset.role==='agent'));render();});
}



function render(){
 document.body.classList.toggle('fx',S.fx);
 if(S.view==='agent')agent();else supervisor();
}
document.getElementById('roleSeg').onclick=e=>{const b=e.target.closest('button');if(!b)return;S.view=b.dataset.role;document.querySelectorAll('#roleSeg button').forEach(x=>x.classList.toggle('on',x===b));render();};
document.getElementById('fxTog').onclick=()=>{S.fx=!S.fx;document.getElementById('fxSw').classList.toggle('on',S.fx);render();};
document.getElementById('resetBtn').onclick=()=>{stop();const v=S.view,f=S.fx;S=fresh();S.view=v;S.fx=f;render();};
render();
</script>
</body>
